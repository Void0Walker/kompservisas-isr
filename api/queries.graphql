query Products {
  products {
    data {
      attributes {
        createdAt
        Product_Name
        Type
        CPU {
          data {
            attributes {
              Name
            }
          }
        }
      }
    }
  }
}

query Manufacturers {
  manufacturers {
    data {
      attributes {
        Name
      }
    }
  }
}

query GetFilteredLaptops(
  $manufacturer: [String]
  $cpu: [String]
  $storage_ssd: [String]
  $display_size: [String]
  $pageSize: Int!
  $page: Int!
) {
  products(
    filters: {
      Type: { eq: "laptop" }
      manufacturer: { Name: { in: $manufacturer } }
      CPU: { Name: { in: $cpu } }
      storage_ssd: { Size: { in: $storage_ssd } }
      display_size: { Size: { in: $display_size } }
    }
    pagination: { page: $page, pageSize: $pageSize }
  ) {
    data {
      id
      attributes {
        Product_Name
        slug
        grade
        Price
        Quantity
        ram {
          data {
            attributes {
              RAM
            }
          }
        }
        gpu {
          data {
            attributes {
              GPU
            }
          }
        }
        Image {
          data {
            attributes {
              url
              formats
              alternativeText
            }
          }
        }
        display_size {
          data {
            attributes {
              Size
            }
          }
        }
        CPU {
          data {
            attributes {
              Name
            }
          }
        }
        storage_ssd {
          data {
            attributes {
              Size
            }
          }
        }
        storage_hdd {
          data {
            attributes {
              Size
            }
          }
        }
        manufacturer {
          data {
            attributes {
              Name
            }
          }
        }
      }
    }
    meta {
      pagination {
        page
        pageCount
        total
      }
    }
  }
}

